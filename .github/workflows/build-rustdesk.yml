name: RustDesk Custom Build

on:
  workflow_dispatch:

  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always

jobs:

  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          vcpkg install opus:x64-windows-static
          vcpkg install libvpx:x64-windows-static

      - name: Configure environment
        shell: pwsh
        run: |
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows-static" >> $env:GITHUB_ENV

      - name: Build Windows
        run: cargo build --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: target/release/*.exe


  linux:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            curl \
            unzip \
            libgtk-3-dev \
            libxcb-randr0-dev \
            libxdo-dev \
            libxfixes-dev \
            libasound2-dev \
            libpam0g-dev \
            liblzma-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      - name: Verify GStreamer
        run: |
          pkg-config --modversion gstreamer-1.0

      - name: Build Linux
        run: cargo build --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: target/release/*


  android:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare Flutter
        run: |
          flutter doctor
          cd flutter
          flutter clean
          flutter pub get

      - name: Build APK
        run: |
          cd flutter
          flutter build apk --release --verbose

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: flutter/build/app/outputs/flutter-apk/*.apk


  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - windows
      - linux
      - android

    runs-on: ubuntu-latest

    steps:

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-build/**
            linux-build/**
            android-apk/**
